<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPremium - Até Logo!</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      text-align: center;
    }

    .goodbye-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      padding: 3rem 2rem;
      max-width: 600px;
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: var(--card-shadow);
    }

    .goodbye-card h2,
    .goodbye-card p {
      color: #1a1a1a;
    }

    .goodbye-icon {
      font-size: 5rem;
      color: var(--primary);
      animation: bounce 2s infinite;
    }

    .goodbye-card h2 {
      font-size: 2.5rem;
      color: #1a1a1a;
    }

    .goodbye-card p {
      font-size: 1.2rem;
      color: #1a1a1a;
      margin-bottom: 2rem;
    }

    .countdown-bar {
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
      margin: 1rem 0;
      overflow: hidden;
    }

    .countdown-bar span {
      display: block;
      height: 100%;
      background: var(--primary);
      width: 100%;
      border-radius: 3px;
      transition: width 1s linear;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .goodbye-card .btn {
      color: #1a1a1a;
    }

    .goodbye-card footer {
      background: none;
      padding: 0;
      color: #1a1a1a;
    }

    .goodbye-card footer p {
      color: #1a1a1a;
    }

    @media (max-width: 480px) {
      .goodbye-card {
        padding: 2rem 1rem;
      }

      .goodbye-card h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="goodbye-card">
    <div class="goodbye-icon"><i class="fas fa-hand-wave"></i></div>
    <h2>Até logo, volte sempre!</h2>
    <p>Obrigado por visitar a AutoPremium. Esperamos vê-lo novamente em breve.</p>
    <div class="countdown-bar"><span id="progressBar"></span></div>
    <p>Redirecionando em <strong id="countdown">10</strong> segundos</p>
    <div class="btn-group">
      <button id="pagina1" class="btn btn-primary"><i class="fas fa-home"></i> Início</button>
      <button id="contato" class="btn btn-secondary"><i class="fas fa-phone"></i> Contato</button>
    </div>
    <footer>

      <div class="footer-logo">
        <img src="imag/Devlops.png" alt="Technatt Devlops" />
      </div>
      <p class="copyright">&copy; 2025 TechNatt</p>
    </footer>
  </div>

  <script>
    let countdown = 10;
    const el = document.getElementById('countdown');
    const bar = document.getElementById('progressBar');
    const interval = setInterval(() => {
      countdown--;
      el.textContent = countdown;
      bar.style.width = (countdown / 10 * 100) + '%';
      if (countdown <= 0) {
        clearInterval(interval);
        window.location.href = 'hh.html';
      }
    }, 1000);

    document.getElementById('pagina1').addEventListener('click', () => {
      clearInterval(interval);
      window.location.href = 'hh.html';
    });
    document.getElementById('contato').addEventListener('click', () => {
      clearInterval(interval);
      alert('Entre em contato pelo WhatsApp (31) 9 8492-4415');
    });
  </script>
</body>

</html>
